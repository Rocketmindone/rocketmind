server {
    listen 80;
    server_name _;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # ── Site (root) ──
    location / {
        root /var/www/site;
        try_files $uri $uri.html $uri/ /index.html;
    }

    location /_next/static/ {
        root /var/www/site;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SaaS (/app) ──
    location /app/ {
        alias /var/www/saas/;
        try_files $uri $uri.html $uri/ /var/www/saas/index.html;
    }

    location /app/_next/static/ {
        alias /var/www/saas/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── R-Plan (/plan) ──
    location /plan/ {
        alias /var/www/rplan/;
        try_files $uri $uri.html $uri/ /var/www/rplan/index.html;
    }

    location /plan/_next/static/ {
        alias /var/www/rplan/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
